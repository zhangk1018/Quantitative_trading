# 量化数据获取与清洗模块 - 配置文件

# 数据源配置
datasource:
  name: baostock
  delay_sec: 0.3
  max_retries: 3
  timeout_sec: 30
  
  # 限流控制配置
  request_interval: 0.3        # 请求间隔（秒）
  max_requests_per_minute: 120  # 每分钟最大请求数
  random_jitter: true          # 是否添加随机抖动
  
  # 复权配置
  adjust_type: none            # 默认复权类型: none/qfq/hfq

# 存储配置
storage:
  type: postgresql  # sqlite 或 postgresql
  batch_size: 1000

  # PostgreSQL 配置
  postgresql:
    host: localhost
    port: 5432
    database: quant_trading
    username: quant_user
    password: ${PG_PASSWORD}

# 定时任务配置
scheduler:
  daily_update_time: "20:10"
  closing_time: "15:10"      # 收盘作业时间（下载当日交易数据）
  daily_stock_list_update_time: "17:30"
  weekly_maintenance_day: 6  # 0=周一, 6=周日
  weekly_maintenance_time: "02:00"
  integrity_check_time: "03:00"  # 每日数据完整性检查时间
  max_download_threads: 2    # 最大下载线程数
  max_retries: 3             # 任务失败最大重试次数
  retry_delay: 60            # 重试间隔（秒）

# 数据校验配置
validation:
  price_min: 0.01
  price_max: 999999.99
  volume_min: 0
  volume_negative_action: "drop"  # drop, set_zero, warn
  ohlc_check: true
  volume_check: true
  price_range_check: true
  duplicate_check: true

# 缓存配置
cache:
  enabled: true
  default_ttl: 300        # 默认缓存5分钟
  quotes_ttl: 60          # 行情数据缓存1分钟
  indicators_ttl: 300     # 指标缓存5分钟
  stock_list_ttl: 3600    # 股票列表缓存1小时
  max_size: 1000          # 最大缓存条目数

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(module)s - %(funcName)s:%(lineno)d - %(message)s"

  # 日志轮转配置
  rotation_mode: size          # 轮转策略: size(按体积) / time(按时间)
  max_bytes_mb: 50             # 单文件体积上限(MB)，仅size模式生效
  backup_count: 5              # 保留的历史文件数量
  time_interval: daily         # 时间轮转周期: hourly/daily/weekly，仅time模式生效
  compress_archived: true      # 是否对轮转出的旧文件执行gzip压缩
  log_encoding: utf-8          # 日志写入编码格式
  flush_interval_ms: 2000      # 缓冲刷新周期(ms)
  log_dir: logs                # 日志目录（支持环境变量或绝对路径）

# 备份配置
backup:
  enabled: true
  backup_dir: data/backups
  max_backups: 30

# 告警配置
alert:
  enabled: false              # 是否启用告警
  
  # 默认阈值配置
  threshold:
    fail_rate: 0.1            # 失败率超过此值触发告警
    empty_data_ratio: 0.3     # 空数据比例超过此值触发告警
    latency_threshold_sec: 300 # 延迟超过此值触发告警
  
  # 动态告警规则（按标的类型配置）
  rules:
    # ETF 类标的（波动小，延迟容忍度低）
    etf:
      pattern: "^(sh|sz)\\.5[0-9]{4}$"  # 匹配ETF代码模式
      thresholds:
        fail_rate: 0.05
        empty_data_ratio: 0.2
        latency_threshold_sec: 180
    
    # 大盘股（波动较小，流动性好）
    large_cap:
      pattern: "^(sh|sz)\\.60[01][0-9]{3}$|^(sh|sz)\\.000[0-9]{3}$"  # 匹配大盘股代码
      thresholds:
        fail_rate: 0.08
        empty_data_ratio: 0.25
        latency_threshold_sec: 240
    
    # 中小盘股（波动较大）
    mid_small_cap:
      pattern: "^(sh|sz)\\.60[3-8][0-9]{3}$|^(sh|sz)\\.00[1-3][0-9]{3}$"
      thresholds:
        fail_rate: 0.12
        empty_data_ratio: 0.35
        latency_threshold_sec: 360
    
    # ST 股票（风险高，波动大）
    st:
      pattern: "^(sh|sz)\\.[0-9]{6}$"
      requires_st_tag: true
      thresholds:
        fail_rate: 0.15
        empty_data_ratio: 0.4
        latency_threshold_sec: 420
  
  # 告警级别
  levels:
    critical:
      min_severity: 0.8
      notify_channels: ["email", "dingtalk"]
    warning:
      min_severity: 0.5
      notify_channels: ["log"]
    info:
      min_severity: 0.2
      notify_channels: ["log"]
