<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化数据监控看板</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6; --cyan: #06b6d4; --purple: #a855f7; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text-dim); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--bg); border-radius: 10px; padding: 14px; text-align: center; }
.stat-card .value { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.stat-card .label { font-size: 12px; color: var(--text-dim); }
.stat-card.green .value { color: var(--green); }
.stat-card.blue .value { color: var(--blue); }
.stat-card.amber .value { color: var(--amber); }
.stat-card.red .value { color: var(--red); }
.stat-card.cyan .value { color: var(--cyan); }
.stat-card.purple .value { color: var(--purple); }
.pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
.pipeline-step { background: var(--bg); border-radius: 10px; padding: 14px; border-left: 3px solid var(--border); }
.pipeline-step.done { border-left-color: var(--green); }
.pipeline-step.running { border-left-color: var(--blue); }
.pipeline-step.failed { border-left-color: var(--red); }
.pipeline-step .step-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.pipeline-step .step-status { font-size: 11px; color: var(--text-dim); }
.progress-bar { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--cyan)); }
.progress-fill.green { background: linear-gradient(90deg, var(--green), #4ade80); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
.chart-strip { display: flex; gap: 8px; height: 120px; align-items: flex-end; padding: 8px 0; width: 100%; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; }
.chart-bar.quotes { background: linear-gradient(to top, var(--blue), var(--cyan)); }
.distribution-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 12px; }
.distribution-label { width: 120px; color: var(--text-dim); }
.distribution-bar { flex: 0.75; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.distribution-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--amber), #fbbf24); }
.distribution-count { width: 40px; text-align: right; color: var(--text-dim); }
button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div><h1>📊 系统状态及数据监控</h1></div>
  <div><button onclick="refreshAll()">🔄 手动刷新</button></div>
</div>

<div class="card">
  <div class="card-title">📈 数据完整性总览</div>
  <div id="dataSummary">加载中...</div>
</div>

<div class="card">
  <div class="card-title">⏱ 定时任务执行状态</div>
  <div id="taskChain">加载中...</div>
</div>

<div class="card">
  <div class="card-title">❤️ 系统健康</div>
  <div id="health">加载中...</div>
</div>

<div class="card">
  <div class="card-title">🔬 数据质量深度检查</div>
  <div id="dataQualityDeep">加载中...</div>
</div>

<script>
// 全局状态缓存
let cacheData = {
  summary: null,
  trend: null,
  taskChain: null,
  health: null,
  fieldCompleteness: null,
  consistency: null,
  anomaly: null,
};

function $(id) { return document.getElementById(id); }

// 统一的 API 调用函数
async function fetchAPI(endpoint) {
  try {
    const response = await fetch(endpoint);
    const result = await response.json();
    if (result.code === 200) {
      return result.data;
    }
    console.error(`API 错误 [${endpoint}]:`, result.message);
    return null;
  } catch (e) {
    console.error(`API 请求失败 [${endpoint}]:`, e);
    return null;
  }
}

// 渲染数据完整性
function renderSummary(summary, trend) {
  let bars = '';
  const minDisplay = 50, maxDisplay = 100; // 显示范围50-100%
  
  if (trend && trend.trend) {
    for (let i = 0; i < trend.trend.length; i++) {
      const r = trend.trend[i];
      // 将覆盖率映射到50-100%的柱子高度，限制在显示范围内
      const clampedRate = Math.min(Math.max(r.coverage_rate, minDisplay), maxDisplay);
      const pct = Math.max(5, ((clampedRate - minDisplay) / (maxDisplay - minDisplay)) * 100);
      bars += `<div class="chart-bar quotes" style="height:${pct}%"></div>`;
    }
  }

  const coverage = summary?.coverage || { 
    coverage_rate: 0, 
    effective_coverage_rate: 0,
    covered_stocks: 0, 
    total_stocks: 0, 
    active_stocks: 0,
    missing_stocks: 0, 
    extra_stocks: 0,
    missing_breakdown: { delisted: 0, suspended: 0, merged: 0, real_missing: 0 }
  };
  const stocks = summary?.stocks || { total: 0, delisted: 0, suspended: 0, active: 0 };
  const breakdown = coverage.missing_breakdown || { delisted: 0, suspended: 0, merged: 0, real_missing: 0 };
  
  // 确定有效覆盖率卡片颜色 - 主要看有效覆盖率
  const effectiveRate = coverage.effective_coverage_rate || 0;
  const coverageCardClass = 
    effectiveRate > 100 ? 'red' : 
    effectiveRate < 95 ? 'amber' : 'green';
  
  $('dataSummary').innerHTML = `
    <!-- 所有统计卡片一行显示 -->
    <div class="stat-row" style="grid-template-columns: repeat(8, 1fr);">
      <div class="stat-card ${coverageCardClass}"><div class="value">${effectiveRate}%</div><div class="label">有效覆盖率</div></div>
      <div class="stat-card blue"><div class="value">${coverage.covered_stocks}</div><div class="label">已覆盖股票</div></div>
      <div class="stat-card amber"><div class="value">${coverage.active_stocks || stocks.active || 0}</div><div class="label">活跃股票</div></div>
      <div class="stat-card cyan"><div class="value">${stocks.total}</div><div class="label">总股票数</div></div>
      <div class="stat-card ${breakdown.delisted > 0 ? 'red' : ''}">
        <div class="value">${breakdown.delisted}</div>
        <div class="label">已退市</div>
      </div>
      <div class="stat-card ${breakdown.suspended > 0 ? 'amber' : ''}">
        <div class="value">${breakdown.suspended}</div>
        <div class="label">ST/停牌</div>
      </div>
      <div class="stat-card ${breakdown.merged > 0 ? 'purple' : ''}">
        <div class="value">${breakdown.merged}</div>
        <div class="label">已合并/长期无交易</div>
      </div>
      <div class="stat-card ${breakdown.real_missing > 0 ? 'red' : ''}">
        <div class="value">${breakdown.real_missing}</div>
        <div class="label">真正缺失</div>
      </div>
    </div>
    
    ${coverage.missing_stocks > 0 || coverage.extra_stocks > 0 ? `
    <div style="margin-top:8px;font-size:12px;">
      ${breakdown.real_missing > 0 ? `<span style="color:var(--red);">⚠️ 有 ${breakdown.real_missing} 只活跃股票缺少数据，建议检查数据下载</span>` : ''}
      ${breakdown.real_missing > 0 && (coverage.missing_stocks > breakdown.real_missing || coverage.extra_stocks > 0) ? '<span style="margin:0 8px;">|</span>' : ''}
      ${coverage.extra_stocks > 0 ? `<span style="color:var(--amber);">⚠️ 多出 ${coverage.extra_stocks} 只股票数据</span>` : ''}
    </div>
    ` : ''}
    ${bars ? `
    <div style="margin-top:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:12px;color:var(--text-dim);">覆盖率趋势（${trend?.trend?.length || 0}天）</div>
        <div style="display:flex;gap:16px;font-size:11px;">
          <span><span style="display:inline-block;width:12px;height:12px;background:linear-gradient(to top, var(--blue), var(--cyan));border-radius:2px;margin-right:4px;vertical-align:middle;"></span>K线：股票价格数据的核心基础</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:stretch;">
        <!-- 图表区域 -->
        <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;">
          <div class="chart-strip">${bars}</div>
        </div>
        <!-- Y轴刻度 -->
        <div style="display:flex;flex-direction:column;justify-content:space-between;width:30px;font-size:10px;color:var(--text-dim);text-align:left;padding-left:4px;">
          <span>100%</span>
          <span>87.5%</span>
          <span>75%</span>
          <span>62.5%</span>
          <span>50%</span>
        </div>
      </div>
    </div>
    ` : ''}
  `;
}

// 渲染定时任务执行状态（6个独立窗口）
function renderTaskChain(chain) {
  const tasks = chain?.tasks || [];
  const overall = chain?.overall || 'pending';
  const date = chain?.date || new Date().toISOString().slice(0, 10);

  // 状态样式映射
  const S = {
    success: { label: '执行成功', icon: '✅', fg: '#22c55e', bg: 'rgba(34,197,94,0.06)', border: '#22c55e' },
    running: { label: '开始执行', icon: '⏳', fg: '#3b82f6', bg: 'rgba(59,130,246,0.08)', border: '#3b82f6' },
    failed:  { label: '执行失败', icon: '❌', fg: '#ef4444', bg: 'rgba(239,68,68,0.06)', border: '#ef4444' },
    pending: { label: '未开始',   icon: '○',  fg: '#94a3b8', bg: 'var(--bg)', border: '#475569' },
    unknown: { label: '状态不明', icon: '?',  fg: '#f59e0b', bg: 'rgba(245,158,11,0.06)', border: '#f59e0b' },
  };

  // 整体状态
  const OI = {
    success: ['✅', '全部完成', '#22c55e'],
    running: ['⏳', '执行中',   '#3b82f6'],
    failed:  ['❌', '有任务失败', '#ef4444'],
    pending: ['○',  '待执行',   '#94a3b8'],
  }[overall] || ['○', '待执行', '#94a3b8'];

  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 12px;background:${S[overall]?.bg || 'var(--bg)'};border-radius:8px;border-left:3px solid ${OI[2]};">
      <span style="font-size:16px;">${OI[0]}</span>
      <span style="font-size:13px;font-weight:600;color:${OI[2]};">${OI[1]}</span>
      <span style="margin-left:auto;font-size:12px;color:#64748b;">${date}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
  `;

  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    const s = S[t.status] || S.pending;
    const dur = t.duration_seconds ? `<span style="color:#64748b;font-size:11px;margin-left:6px;">${Math.floor(t.duration_seconds / 60)}m${Math.round(t.duration_seconds % 60)}s</span>` : '';
    const err = t.status === 'failed' && t.message ? `<div style="margin-top:6px;padding:5px 8px;background:rgba(239,68,68,0.1);border-radius:5px;font-size:11px;color:#ef4444;line-height:1.4;word-break:break-all;">${t.message}</div>` : '';

    html += `
      <div style="background:${s.bg};border:1px solid ${s.border};border-radius:8px;padding:14px 12px;">
        <div style="font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:8px;line-height:1.3;">${t.name || ('任务' + (i + 1))}</div>
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="font-size:15px;">${s.icon}</span>
          <span style="font-size:12px;font-weight:500;color:${s.fg};">${s.label}</span>${dur}
        </div>${err}
      </div>`;
  }

  html += '</div>';
  $('taskChain').innerHTML = html;
}

// 渲染系统健康
function renderHealth(health) {
    const dbOk = health?.database || false;
    const tushareOk = health?.data_sources?.tushare || false;
    const baostockOk = health?.data_sources?.baostock || false;
    const partitions = health?.partitions || {};
    
    // stock_quotes 分区的实际格式：stock_quotes_2026（按年份）
    const stockQuotesParts = partitions.stock_quotes || [];
    // 从分区名中提取年份，如 stock_quotes_2026 → 2026
    const extractYear = (name) => {
        const m = name.match(/(\d{4})$/);
        return m ? m[1] : null;
    };
    const partitionYears = stockQuotesParts.map(extractYear).filter(Boolean);
    
    // 期望的年份范围：从最小分区年份到当前年份+1
    const minYear = partitionYears.length > 0 ? Math.min(...partitionYears.map(Number)) : 2000;
    const maxYear = Math.max(new Date().getFullYear(), ...partitionYears.map(Number));
    const expectedYears = [];
    for (let y = minYear; y <= maxYear; y++) expectedYears.push(String(y));
    
    const missingYears = expectedYears.filter(y => !partitionYears.includes(y));
    const extraYears = partitionYears.filter(y => !expectedYears.includes(y));
    const allOk = missingYears.length === 0 && extraYears.length === 0;

    $('health').innerHTML = `
        <div class="stat-row" style="grid-template-columns:repeat(4,1fr);gap:12px;">
            <div class="stat-card ${dbOk ? 'green' : 'red'}"><div class="value">${dbOk ? '✅' : '❌'}</div><div class="label">数据库</div></div>
            <div class="stat-card ${tushareOk ? 'green' : 'amber'}"><div class="value">${tushareOk ? '✅' : '⚠️'}</div><div class="label">Tushare</div></div>
            <div class="stat-card ${baostockOk ? 'green' : 'red'}"><div class="value">${baostockOk ? '✅' : '❌'}</div><div class="label">Baostock</div></div>
            <div class="stat-card ${allOk ? 'green' : 'red'}"><div class="value">${allOk ? '✅' : '❌'}</div><div class="label">分区状态</div></div>
        </div>
        ${stockQuotesParts.length > 0 ? `
        <div style="font-size:12px;color:var(--text-dim);margin-top:8px;">
            ${allOk ? '分区覆盖: 正常' : ''}
            ${!allOk ? `
                ${missingYears.length > 0 ? `<span style="color:var(--red);">缺失分区: ${missingYears.join(', ')}</span>` : ''}
                ${extraYears.length > 0 ? `<span style="color:var(--amber);">额外分区: ${extraYears.join(', ')}</span>` : ''}
            ` : ''}
        </div>
        ` : '<div style="font-size:12px;color:var(--red);margin-top:8px;">❌ 未找到任何分区</div>'}
    `;
}

// 渲染数据质量深度检查
function renderDataQualityDeep(data) {
  const fc = data.fieldCompleteness || { tables: {}, issues: [], overall_status: 'ok', overall_score: 100 };
  const cc = data.consistency || { checks: [], overall_status: 'ok', warnings: [] };
  const ad = data.anomaly || { checks: [], overall_status: 'ok' };
  const ql = data.quality || { nan_statistics: {}, indicator_failed_stocks: { total_missing: 0, sample_codes: [] }, sync_failed: 0 };

  // 用字段完整性评分决定整体状态
  const fcScore = fc.overall_score || 100;
  const fcOk = fcScore >= 95;
  const overallStatus = fcOk && cc.overall_status !== 'error' && ad.overall_status !== 'error' ? 'ok'
    : (cc.overall_status === 'error' || ad.overall_status === 'error') ? 'error' : 'warning';
  const statusColor = overallStatus === 'error' ? 'var(--red)' : overallStatus === 'warning' ? 'var(--amber)' : 'var(--green)';
  const statusText = overallStatus === 'error' ? '有错误' : overallStatus === 'warning' ? '有警告' : '全部正常';

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);">
      <span style="font-size:14px;color:${statusColor};font-weight:600;">● ${statusText}</span>
      <span style="font-size:12px;color:var(--text-dim);">字段完整性: ${fcOk ? '✅' : '❌'} <span style="color:${fcOk ? 'var(--green)' : 'var(--red)'}">${fcScore}%</span></span>
      <span style="font-size:12px;color:var(--text-dim);">| 一致性: ${cc.overall_status === 'ok' ? '✅' : cc.overall_status === 'warning' ? '⚠️' : '❌'}</span>
      <span style="font-size:12px;color:var(--text-dim);">| 异常值: ${ad.overall_status === 'ok' ? '✅' : ad.overall_status === 'warning' ? '⚠️' : '❌'}</span>
    </div>
    <div class="two-col">
      <!-- 左列：字段完整性 + 一致性 -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">📋 字段完整性</div>
          ${renderFieldCompleteness(fc)}
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">🔗 数据一致性</div>
          ${renderConsistency(cc)}
        </div>
      </div>
      <!-- 右列：异常值检测 + 管道异常 -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">⚠️ 异常值检测</div>
          ${renderAnomaly(ad)}
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">📊 NaN & 同步异常</div>
          ${renderNaNandSync(ql)}
        </div>
      </div>
    </div>
  `;

  $('dataQualityDeep').innerHTML = html;
}

function renderFieldCompleteness(fc) {
  const tables = fc.tables || {};
  const issues = fc.issues || [];
  let html = '';

  // 每个表摘要
  const tableLabels = {
    stock_quotes: '行情数据',
    stock_daily_snapshot: '每日快照',
    stock_indicators: '技术指标',
    stock_adj_factor: '复权因子',
  };

  for (const [tbl, info] of Object.entries(tables)) {
    const label = tableLabels[tbl] || tbl;
    const score = info.completeness_score || 100;
    const scoreOk = score >= 95;
    const nullFields = info.fields.filter(f => f.null_count > 0);

    html += `<div style="margin-bottom:10px;padding:8px;border-radius:8px;background:${scoreOk ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)'};">`;
    html += `<div style="font-size:12px;font-weight:500;margin-bottom:4px;">${label} <span style="color:var(--text-dim);font-weight:400;">(${info.total_rows}行)</span> <span style="color:${scoreOk ? 'var(--green)' : 'var(--red)'};font-weight:600;">${scoreOk ? '✅' : '❌'} ${score}%</span></div>`;

    if (scoreOk) {
      // >= 95%: 不展示详细报错信息
      html += `<div style="font-size:11px;color:var(--green);">✅ 数据完整</div>`;
    } else {
      for (const f of nullFields) {
        const color = f.null_rate >= 20 ? 'var(--red)' : 'var(--amber)';
        html += `<div style="font-size:11px;color:${color};margin-left:8px;">⚠️ ${f.field}: ${f.null_count}空(${f.null_rate}%)</div>`;
      }
    }
    html += '</div>';
  }

  if (issues.length === 0 && Object.keys(tables).length === 0) {
    html = '<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:12px;">暂无数据</div>';
  }

  return html;
}

function renderConsistency(cc) {
  const checks = cc.checks || [];
  const warnings = cc.warnings || [];
  let html = '';

  if (checks.length === 0) {
    return '<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:12px;">暂无数据</div>';
  }

  // 警告（如复权因子缺失）
  for (const w of warnings) {
    const levelColor = w.level === 'critical' ? 'var(--red)' : 'var(--amber)';
    html += `<div style="background:rgba(239,68,68,0.1);border-left:3px solid ${levelColor};padding:8px 10px;margin-bottom:8px;border-radius:0 6px 6px 0;">
      <div style="font-size:12px;color:${levelColor};">${w.message}</div>
      <div style="font-size:11px;color:var(--text-dim);">💡 ${w.suggestion}</div>
    </div>`;
  }

  for (const c of checks) {
    const color = c.status === 'ok' ? 'var(--green)' : c.status === 'warning' ? 'var(--amber)' : 'var(--red)';
    const icon = c.status === 'ok' ? '✅' : c.status === 'warning' ? '⚠️' : '❌';
    html += `<div style="margin-bottom:8px;padding:6px 8px;border-radius:6px;background:${c.status === 'ok' ? 'rgba(34,197,94,0.05)' : 'rgba(239,68,68,0.05)'};">`;
    html += `<div style="font-size:12px;"><span>${icon}</span> <strong>${c.name}</strong> <span style="color:${color};font-size:11px;">(${c.status})</span></div>`;
    html += `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">`;

    if (c.quote_stocks !== undefined) {
      html += `行情 ${c.quote_stocks}只 → 指标 ${c.indicator_stocks}只`;
      if (c.real_missing > 0) {
        html += ` <span style="color:var(--red);">缺${c.real_missing}只（≥60天）</span>`;
      }
      if (c.new_stocks_lt_60d > 0) {
        html += ` <span style="color:var(--amber);">新股${c.new_stocks_lt_60d}只（<60天，正常）</span>`;
      }
      if (c.diff_codes && c.diff_codes.length > 0) {
        html += ` <span class="diff-toggle" style="cursor:pointer;color:var(--blue);text-decoration:underline;" onclick="toggleDiff(this, '${c.name.replace(/\s/g, '')}')">[查看代码]</span>`;
        html += `<div id="diff-${c.name.replace(/\s/g, '')}" style="display:none;margin-top:4px;max-height:120px;overflow-y:auto;font-size:10px;color:var(--text-dim);">${c.diff_codes.join(', ')}</div>`;
      }
    } else if (c.adj_factor_stocks !== undefined) {
      html += `${c.adj_factor_stocks}只股票, ${c.adj_factor_days}天数据`;
    } else if (c.snapshot_stocks !== undefined) {
      html += `快照 ${c.snapshot_stocks}只 vs 行情 ${c.quote_stocks_at_date}只`;
    } else if (c.st_total !== undefined) {
      html += `ST共${c.st_total}只, 有数据${c.st_with_data}只, 缺失${c.st_missing}只`;
    } else if (c.missing_trade_days_since_2020 !== undefined) {
      html += `非交易日污染: ${c.has_weekend_pollution ? '⚠️有' : '✅无'}`;
      html += ` | 交易日缺失(2020至今): ${c.missing_trade_days_since_2020}天`;
    }
    html += `</div></div>`;
  }

  return html;
}

function renderAnomaly(ad) {
  const checks = ad.checks || [];
  let html = '';

  if (checks.length === 0) {
    return '<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:12px;">暂无数据</div>';
  }

  for (const c of checks) {
    const color = c.status === 'ok' ? 'var(--green)' : c.status === 'warning' ? 'var(--amber)' : 'var(--red)';
    const icon = c.status === 'ok' ? '✅' : c.status === 'warning' ? '⚠️' : '❌';
    html += `<div style="margin-bottom:8px;padding:6px 8px;border-radius:6px;background:${c.status === 'ok' ? 'rgba(34,197,94,0.05)' : 'rgba(239,68,68,0.05)'};">`;
    html += `<div style="font-size:12px;"><span>${icon}</span> <strong>${c.name}</strong> <span style="color:${color};font-size:11px;">(${c.status})</span></div>`;
    html += `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">`;

    if (c.details) {
      const items = [];
      for (const [k, v] of Object.entries(c.details)) {
        const labelMap = {
          high_lt_low: '最高<最低', open_outside: '开盘超范围', close_outside: '收盘超范围',
          neg_close: '收盘价≤0', neg_volume: '成交量<0',
          extreme_pct: '涨跌幅>100%', null_pct_chg: '涨跌幅为空',
          zero_volume: '成交量=0', zero_amount: '成交额=0',
          null_volume: '成交量为空', null_amount: '成交额为空',
        };
        items.push(`${labelMap[k] || k}: ${v}`);
      }
      html += items.join(' | ');
    } else if (c.count !== undefined) {
      html += `数量: ${c.count}`;
      if (c.stocks && c.stocks.length > 0) {
        html += ` <span class="diff-toggle" style="cursor:pointer;color:var(--blue);text-decoration:underline;" onclick="toggleDiff(this, '${c.name.replace(/\s/g, '')}')">[查看清单]</span>`;
        html += `<div id="diff-${c.name.replace(/\s/g, '')}" style="display:none;margin-top:4px;max-height:120px;overflow-y:auto;font-size:10px;color:var(--text-dim);">${c.stocks.map(s => `${s.code}(${s.name})`).join(', ')}</div>`;
      }
    }
    html += `</div></div>`;
  }

  return html;
}

function renderNaNandSync(ql) {
  const nanStats = ql.nan_statistics || {};
  const indicatorFailed = ql.indicator_failed_stocks || { total_missing: 0, sample_codes: [], note: '' };
  const syncFailed = ql.sync_failed || 0;
  const failedStocks = ql.sync_failed_stocks || [];
  let html = '';

  // NaN统计
  const nanEntries = Object.entries(nanStats);
  if (nanEntries.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--amber);margin-bottom:6px;">⚠️ 字段NaN统计 (快照表)</div>`;
    for (const [field, info] of nanEntries) {
      html += `<div style="font-size:11px;color:var(--text-dim);margin-left:8px;">${field}: ${info.null_count}空(${info.null_rate}%)</div>`;
    }
  } else {
    html += `<div style="font-size:11px;color:var(--green);">✅ 无NaN字段</div>`;
  }

  // 指标计算失败
  if (indicatorFailed.total_missing > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--red);margin-top:10px;margin-bottom:4px;">❌ 指标计算缺失: ${indicatorFailed.total_missing}只</div>`;
    html += `<div style="font-size:11px;color:var(--text-dim);">${indicatorFailed.note}</div>`;
    if (indicatorFailed.sample_codes && indicatorFailed.sample_codes.length > 0) {
      html += ` <span class="diff-toggle" style="cursor:pointer;color:var(--blue);text-decoration:underline;font-size:11px;" onclick="toggleDiff(this, 'indicatorFailed')">[查看示例代码]</span>`;
      html += `<div id="diff-indicatorFailed" style="display:none;margin-top:4px;max-height:120px;overflow-y:auto;font-size:10px;color:var(--text-dim);">${indicatorFailed.sample_codes.join(', ')}</div>`;
    }
  }

  // sync失败
  if (syncFailed > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--red);margin-top:10px;margin-bottom:4px;">❌ 同步失败: ${syncFailed}条</div>`;
    if (failedStocks.length > 0) {
      for (const s of failedStocks.slice(0, 3)) {
        html += `<div style="font-size:11px;color:var(--text-dim);margin-left:8px;">${s.code} (${s.cycle}): ${s.fail_reason}</div>`;
      }
      if (failedStocks.length > 3) {
        html += `<span class="diff-toggle" style="cursor:pointer;color:var(--blue);text-decoration:underline;font-size:11px;" onclick="toggleDiff(this, 'syncFailed')">[查看全部${failedStocks.length}条]</span>`;
        html += `<div id="diff-syncFailed" style="display:none;margin-top:4px;max-height:120px;overflow-y:auto;font-size:10px;color:var(--text-dim);">${failedStocks.map(s => `${s.code}(${s.cycle}): ${s.fail_reason}`).join('<br>')}</div>`;
      }
    }
  }

  if (!html) {
    html = '<div style="font-size:12px;color:var(--green);">✅ 无异常</div>';
  }

  return html;
}

// 切换Diff列表展开/收起
function toggleDiff(el, id) {
  const div = document.getElementById('diff-' + id);
  if (div) {
    const isHidden = div.style.display === 'none';
    div.style.display = isHidden ? 'block' : 'none';
    el.textContent = isHidden ? '[收起]' : '[查看]';
  }
}

// 主刷新函数 - 从真实 API 获取数据
async function refreshAll() {
  // 更新按钮状态
  const btn = document.querySelector('button');
  const originalText = btn.innerHTML;
  btn.innerHTML = '🔄 刷新中...';
  btn.disabled = true;

  try {
    // 并行获取所有数据
    const [summary, trend, taskChain, health, fieldCompleteness, consistency, anomaly] = await Promise.all([
      fetchAPI('/api/monitor/data-summary/'),
      fetchAPI('/api/monitor/coverage-trend/'),
      fetchAPI('/api/monitor/task-chain/'),
      fetchAPI('/api/monitor/health-check/'),
      fetchAPI('/api/monitor/field-completeness/'),
      fetchAPI('/api/monitor/consistency-check/'),
      fetchAPI('/api/monitor/anomaly-detection/'),
    ]);

    // 缓存数据
    cacheData = { summary, trend, taskChain, health, fieldCompleteness, consistency, anomaly };

    // 渲染所有模块
    renderSummary(summary, trend);
    renderTaskChain(taskChain);
    renderHealth(health);
    renderDataQualityDeep({ fieldCompleteness, consistency, anomaly });

  } finally {
    // 恢复按钮状态
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', async () => {
  // 直接刷新最新数据
  await refreshAll();
});
</script>
