<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化系统监控看板</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --blue: #3b82f6; --cyan: #06b6d4; --purple: #a855f7; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 20px; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title { font-size: 16px; font-weight: 700; margin: 24px 0 14px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 12px; }
.stat-card { background: var(--bg); border-radius: 10px; padding: 14px; text-align: center; }
.stat-card .value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.stat-card .label { font-size: 12px; color: var(--text-dim); }
.stat-card.green .value { color: var(--green); }
.stat-card.blue .value { color: var(--blue); }
.stat-card.amber .value { color: var(--amber); }
.stat-card.red .value { color: var(--red); }
.stat-card.cyan .value { color: var(--cyan); }
.stat-card.purple .value { color: var(--purple); }
/* 顶部状态条 */
.status-bar { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--bg); border-radius: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.status-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.status-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
.status-text { font-size: 15px; font-weight: 600; }
.status-meta { font-size: 12px; color: var(--text-dim); margin-left: auto; }
/* 任务链 3列 */
.pipeline-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pipeline-step { background: var(--bg); border-radius: 10px; padding: 14px 12px; border-left: 3px solid var(--border); }
.pipeline-step.done { border-left-color: var(--green); }
.pipeline-step.running { border-left-color: var(--blue); }
.pipeline-step.failed { border-left-color: var(--red); }
.pipeline-step.partial { border-left-color: var(--amber); }
.pipeline-step.pending { border-left-color: #475569; }
.pipeline-step .step-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.pipeline-step .step-status { font-size: 11px; color: var(--text-dim); }
.pipeline-step .step-meta { font-size: 10px; color: #64748b; margin-top: 4px; }
/* 进度条 */
.progress-bar { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--cyan)); }
.progress-fill.green { background: linear-gradient(90deg, var(--green), #4ade80); }
/* 双列 */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
/* 柱状图 */
.chart-strip { display: flex; gap: 8px; height: 120px; align-items: flex-end; padding: 8px 0; width: 100%; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; }
.chart-bar.quotes { background: linear-gradient(to top, var(--blue), var(--cyan)); }
.chart-labels { display: flex; gap: 8px; margin-top: 4px; }
.chart-label { flex: 1; text-align: center; font-size: 10px; color: var(--text-dim); }
/* 按钮 */
button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
button:hover { background: #334155; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
/* 展开/收起 */
.lazy-section { display: none; }
.lazy-section.visible { display: block; }
/* 指标 */
.tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.tag.green { background: rgba(34,197,94,0.15); color: var(--green); }
.tag.red { background: rgba(239,68,68,0.15); color: var(--red); }
.tag.amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.tag.gray { background: rgba(148,163,184,0.15); color: var(--text-dim); }
.tag.blue { background: rgba(59,130,246,0.15); color: var(--blue); }
</style>
</head>
<body>

<div class="header">
  <div><h1>📊 量化系统监控看板</h1></div>
  <div class="header-actions">
    <span id="autoRefreshIndicator" style="font-size:11px;color:var(--text-dim);">60s 自动刷新</span>
    <button id="manualRefreshBtn">🔄 手动刷新</button>
  </div>
</div>

<!-- ===== 顶部状态条 ===== -->
<div id="statusBar" class="status-bar">加载中...</div>

<!-- ===== 板块一：程序运行状态 ===== -->
<div class="section-title">⏱ 程序运行状态</div>
<div class="card">
  <div id="taskChain">加载中...</div>
</div>

<!-- ===== 板块二：数据质量 ===== -->
<div class="section-title">📈 数据质量</div>
<div class="card">
  <div class="card-title">📋 数据完整性总览</div>
  <div id="dataSummary">加载中...</div>
</div>

<div class="card" style="margin-bottom:12px;">
  <div class="card-title" style="margin-bottom:0;">
    🔬 数据质量深度检查
    <button id="toggleQualityBtn" style="margin-left:auto;padding:4px 10px;font-size:11px;">展开详情</button>
  </div>
  <div id="dataQualityDeep" class="lazy-section" style="margin-top:12px;">
    点击"展开详情"查看字段完整性、一致性、异常值检测
  </div>
</div>

<!-- ===== 板块三：系统基础 ===== -->
<div class="section-title">❤️ 系统基础</div>
<div class="card">
  <div id="health">加载中...</div>
</div>

<script>
// ===== 状态 =====
let cacheData = { summary: null, trend: null, taskChain: null, health: null };
let qualityLoaded = false;
let autoRefreshTimer = null;

function $(id) { return document.getElementById(id); }

// ===== API 调用 =====
async function fetchAPI(endpoint) {
  try {
    const response = await fetch(endpoint);
    const result = await response.json();
    if (result.code === 200) return result.data;
    console.error(`API 错误 [${endpoint}]:`, result.message);
    return null;
  } catch (e) {
    console.error(`API 请求失败 [${endpoint}]:`, e);
    return null;
  }
}

// ===== 渲染顶部状态条 =====
function renderStatusBar(summary, taskChain, health) {
  const overall = taskChain?.overall || 'pending';
  const statusMap = {
    success: { dot: 'green', text: '健康', meta: '全部任务正常' },
    pending: { dot: 'amber', text: '待执行', meta: '今日盘后任务尚未执行/完成' },
    partial: { dot: 'amber', text: '部分完成', meta: '部分任务数据不足或未到位' },
    failed:  { dot: 'red', text: '异常', meta: '有任务执行失败，需排查' },
  };
  const s = statusMap[overall] || statusMap.pending;
  const latestDate = summary?.coverage?.latest_date || '--';
  const effRate = summary?.coverage?.effective_coverage_rate ?? '--';
  const dbOk = health?.database?.connected ? '✅' : '❌';

  $('statusBar').innerHTML = `
    <span class="status-dot ${s.dot}"></span>
    <span class="status-text" style="color:var(--${s.dot === 'green' ? 'green' : s.dot === 'amber' ? 'amber' : 'red'});">${s.text}</span>
    <span style="font-size:12px;color:var(--text-dim);">${s.meta}</span>
    <span class="status-meta">
      数据日期: ${latestDate} &nbsp;|&nbsp; 有效覆盖率: ${effRate}% &nbsp;|&nbsp; 数据库: ${dbOk}
    </span>
  `;
}

// ===== 渲染数据完整性 =====
function renderSummary(summary, trend) {
  let bars = '';
  let labels = '';
  const minDisplay = 50, maxDisplay = 100;

  if (trend && trend.trend) {
    for (let i = 0; i < trend.trend.length; i++) {
      const r = trend.trend[i];
      const clampedRate = Math.min(Math.max(r.coverage_rate, minDisplay), maxDisplay);
      const pct = Math.max(5, ((clampedRate - minDisplay) / (maxDisplay - minDisplay)) * 100);
      bars += `<div class="chart-bar quotes" style="height:${pct}%"></div>`;
      const dateLabel = r.date ? r.date.substring(5) : '';
      labels += `<div class="chart-label">${dateLabel}</div>`;
    }
  }

  const coverage = summary?.coverage || {};
  const breakdown = coverage.missing_breakdown || {};
  const stocks = summary?.stocks || {};
  const missingCodes = (summary?.warnings || []).find(w => w.type === 'real_missing')?.missing_codes || [];
  const realMissing = breakdown.real_missing || 0;

  const effRate = coverage.effective_coverage_rate || 0;
  const coverageCardClass = effRate > 100 ? 'red' : effRate < 95 ? 'amber' : 'green';

  $('dataSummary').innerHTML = `
    <div class="stat-row" style="grid-template-columns:repeat(9, 1fr);">
      <div class="stat-card ${coverageCardClass}"><div class="value">${effRate}%</div><div class="label">有效覆盖率</div></div>
      <div class="stat-card blue"><div class="value">${coverage.covered_stocks || 0}</div><div class="label">已覆盖股票</div></div>
      <div class="stat-card amber"><div class="value">${coverage.active_stocks || stocks.active || 0}</div><div class="label">活跃股票</div></div>
      <div class="stat-card cyan"><div class="value">${stocks.total || 0}</div><div class="label">总股票数</div></div>
      <div class="stat-card ${breakdown.delisted > 0 ? 'red' : ''}"><div class="value">${breakdown.delisted || 0}</div><div class="label">已退市</div></div>
      <div class="stat-card ${breakdown.suspended > 0 ? 'amber' : ''}"><div class="value">${breakdown.suspended || 0}</div><div class="label">ST/停牌</div></div>
      <div class="stat-card ${breakdown.merged > 0 ? 'purple' : ''}"><div class="value">${breakdown.merged || 0}</div><div class="label">已合并</div></div>
      <div class="stat-card ${(breakdown.suspended_recent || 0) > 0 ? 'amber' : ''}"><div class="value">${breakdown.suspended_recent || 0}</div><div class="label">近期停牌</div></div>
      <div class="stat-card ${realMissing > 0 ? 'red' : ''}"><div class="value">${realMissing}</div><div class="label">真正缺失</div></div>
    </div>
    ${realMissing > 0 ? `<div style="margin-top:8px;font-size:12px;"><span style="color:var(--red);">⚠️ 有 ${realMissing} 只活跃股票缺少数据：` + (missingCodes.length > 0 ? missingCodes.slice(0,5).join(', ') + (missingCodes.length > 5 ? '...' : '') : '') + `</span></div>` : ''}
    ${bars ? `
    <div style="margin-top:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:12px;color:var(--text-dim);">覆盖率趋势（${trend?.trend?.length || 0}天）</div>
      </div>
      <div style="display:flex;gap:8px;align-items:stretch;">
        <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;">
          <div class="chart-strip">${bars}</div>
          <div class="chart-labels">${labels}</div>
        </div>
        <div style="display:flex;flex-direction:column;justify-content:space-between;width:30px;font-size:10px;color:var(--text-dim);text-align:left;padding-left:4px;">
          <span>100%</span>
          <span>87.5%</span>
          <span>75%</span>
          <span>62.5%</span>
          <span>50%</span>
        </div>
      </div>
    </div>` : ''}
  `;
}

// ===== 渲染任务链 =====
function renderTaskChain(chain) {
  const tasks = chain?.tasks || [];
  const overall = chain?.overall || 'pending';
  const date = chain?.date || '--';

  const S = {
    success: { label: '成功', icon: '✅', fg: 'var(--green)' },
    partial: { label: '部分完成', icon: '⚠️', fg: 'var(--amber)' },
    pending: { label: '待执行', icon: '○', fg: 'var(--text-dim)' },
    failed:  { label: '失败', icon: '❌', fg: 'var(--red)' },
    unknown: { label: '状态不明', icon: '?', fg: 'var(--amber)' },
  };

  const overallLabel = S[overall]?.label || '待执行';
  const overallColor = S[overall]?.fg || 'var(--text-dim)';
  const overallIcon = S[overall]?.icon || '○';

  // 统计
  const successCnt = tasks.filter(t => t.status === 'success').length;
  const totalCnt = tasks.length;

  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 12px;background:var(--bg);border-radius:8px;border-left:3px solid ${overallColor};">
      <span style="font-size:16px;">${overallIcon}</span>
      <span style="font-size:13px;font-weight:600;color:${overallColor};">${overallLabel}</span>
      <span style="font-size:12px;color:var(--text-dim);">${successCnt}/${totalCnt} 任务完成</span>
      <span style="margin-left:auto;font-size:12px;color:#64748b;">${date}</span>
    </div>
    <div class="pipeline-grid">
  `;

  for (const t of tasks) {
    const s = S[t.status] || S.pending;
    const borderClass = t.status === 'success' ? 'done' : t.status === 'failed' ? 'failed' : t.status === 'partial' ? 'partial' : t.status === 'running' ? 'running' : 'pending';
    html += `
      <div class="pipeline-step ${borderClass}">
        <div class="step-name">${t.name || t.key}</div>
        <div class="step-status"><span>${s.icon}</span> ${s.label}</div>
        <div class="step-meta">${t.message || ''}</div>
      </div>`;
  }

  html += '</div>';
  $('taskChain').innerHTML = html;
}

// ===== 渲染系统健康 =====
function renderHealth(health) {
  const db = health?.database || {};
  const dbOk = db.connected || false;
  const tushareOk = health?.data_sources?.tushare || false;
  const baostockOk = health?.data_sources?.baostock || false;
  const partitions = health?.partitions || {};
  const stockQuotesParts = partitions.stock_quotes || [];
  const extractYear = (name) => { const m = name.match(/(\d{4})$/); return m ? m[1] : null; };
  const partitionYears = stockQuotesParts.map(extractYear).filter(Boolean);
  const minYear = partitionYears.length > 0 ? Math.min(...partitionYears.map(Number)) : 2000;
  const maxYear = Math.max(new Date().getFullYear(), ...partitionYears.map(Number));
  const expectedYears = [];
  for (let y = minYear; y <= maxYear; y++) expectedYears.push(String(y));
  const missingYears = expectedYears.filter(y => !partitionYears.includes(y));
  const allOk = missingYears.length === 0;

  $('health').innerHTML = `
    <div class="stat-row" style="grid-template-columns:repeat(4,1fr);gap:12px;">
      <div class="stat-card ${dbOk ? 'green' : 'red'}"><div class="value">${dbOk ? '✅' : '❌'}</div><div class="label">数据库</div></div>
      <div class="stat-card ${tushareOk ? 'green' : 'amber'}"><div class="value">${tushareOk ? '✅' : '⚠️'}</div><div class="label">Tushare</div></div>
      <div class="stat-card ${baostockOk ? 'green' : 'red'}"><div class="value">${baostockOk ? '✅' : '❌'}</div><div class="label">Baostock</div></div>
      <div class="stat-card ${allOk ? 'green' : 'red'}"><div class="value">${allOk ? '✅' : '❌'}</div><div class="label">分区状态</div></div>
    </div>
    ${stockQuotesParts.length > 0 ? `
    <div style="font-size:12px;color:var(--text-dim);margin-top:8px;">
      ${allOk ? '分区覆盖: 正常' : ''}
      ${!allOk ? `<span style="color:var(--red);">缺失分区: ${missingYears.join(', ')}</span>` : ''}
      &nbsp;|&nbsp; 共 ${stockQuotesParts.length} 个分区
    </div>` : '<div style="font-size:12px;color:var(--red);margin-top:8px;">❌ 未找到任何分区</div>'}
  `;
}

// ===== 渲染数据质量深度检查（懒加载） =====
async function renderDataQualityDeep() {
  const btn = $('toggleQualityBtn');
  if (!btn) return;

  btn.disabled = true;
  btn.textContent = '加载中...';

  const endpoints = [
    '/api/monitor/field-completeness/',
    '/api/monitor/consistency-check/',
    '/api/monitor/anomaly-detection/',
  ];
  const results = await Promise.allSettled(endpoints.map(e => fetchAPI(e)))
    .then(r => r.map(x => x.status === 'fulfilled' ? x.value : null));
  const [fc, cc, ad] = results;

  // 渲染
  const fcScore = fc?.overall_score ?? 100;
  const fcOk = fcScore >= 95;
  const ccStatus = cc?.overall_status === 'ok' ? '✅' : cc?.overall_status === 'warning' ? '⚠️' : '❌';
  const adStatus = ad?.overall_status === 'ok' ? '✅' : ad?.overall_status === 'warning' ? '⚠️' : '❌';

  // 字段完整性表格
  let fcHtml = '';
  const tables = fc?.tables || {};
  const tableLabels = { stock_quotes: '行情数据', stock_daily_snapshot: '每日快照', stock_indicators: '技术指标', stock_adj_factor: '复权因子' };
  for (const [tbl, info] of Object.entries(tables)) {
    const label = tableLabels[tbl] || tbl;
    const score = info.completeness_score || 100;
    const scoreOk = score >= 95;
    const nullFields = (info.fields || []).filter(f => f.null_count > 0);
    fcHtml += `<div style="margin-bottom:10px;padding:8px;border-radius:8px;background:${scoreOk ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)'};">`;
    fcHtml += `<div style="font-size:12px;font-weight:500;">${label} <span style="color:var(--text-dim);font-weight:400;">(${info.total_rows || 0}行)</span> <span style="color:${scoreOk ? 'var(--green)' : 'var(--red)'};font-weight:600;">${scoreOk ? '✅' : '❌'} ${score}%</span></div>`;
    if (nullFields.length === 0) {
      fcHtml += `<div style="font-size:11px;color:var(--green);margin-top:2px;">✅ 无空值字段</div>`;
    } else {
      for (const f of nullFields) {
        const color = f.null_rate >= 20 ? 'var(--red)' : 'var(--amber)';
        fcHtml += `<div style="font-size:11px;color:${color};margin-left:8px;margin-top:2px;">⚠️ ${f.field}: ${f.null_count}空(${f.null_rate}%)</div>`;
      }
    }
    fcHtml += '</div>';
  }
  if (!fcHtml) fcHtml = '<div style="font-size:12px;color:var(--text-dim);">暂无数据</div>';

  $('dataQualityDeep').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);">
      <span style="font-size:13px;color:${fcOk ? 'var(--green)' : 'var(--red)'};font-weight:600;">字段完整性: ${fcOk ? '✅' : '❌'} <span style="color:${fcOk ? 'var(--green)' : 'var(--red)'}">${fcScore}%</span></span>
      <span style="font-size:12px;color:var(--text-dim);">| 一致性: ${ccStatus}</span>
      <span style="font-size:12px;color:var(--text-dim);">| 异常值: ${adStatus}</span>
    </div>
    <div class="two-col">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">📋 字段完整性</div>
          ${fcHtml}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px;">⚠️ 异常值检测</div>
          <div style="font-size:12px;color:var(--text-dim);">已加载，详细数据见响应报文</div>
        </div>
      </div>
    </div>
  `;

  btn.disabled = false;
  btn.textContent = '收起详情';
  qualityLoaded = true;
}

// ===== 收起深度检查 =====
function collapseQuality() {
  const section = $('dataQualityDeep');
  const btn = $('toggleQualityBtn');
  section.innerHTML = '点击"展开详情"查看字段完整性、一致性、异常值检测';
  btn.textContent = '展开详情';
  qualityLoaded = false;
  $('dataQualityDeep').classList.remove('visible');
}

// ===== 主刷新 =====
async function refreshAll() {
  const btn = $('manualRefreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '🔄 刷新中...'; }

  try {
    // 首屏 3 个核心请求
    const [summary, trend, taskChain, health] = await Promise.allSettled([
      fetchAPI('/api/monitor/data-summary/'),
      fetchAPI('/api/monitor/coverage-trend/'),
      fetchAPI('/api/monitor/task-chain/'),
      fetchAPI('/api/monitor/health-check/'),
    ]).then(results => results.map(r => r.status === 'fulfilled' ? r.value : null));

    cacheData = { summary, trend, taskChain, health };

    // 渲染
    renderStatusBar(summary, taskChain, health);
    renderSummary(summary, trend);
    renderTaskChain(taskChain);
    renderHealth(health);

    // 如果曾经展开过质量深度，保持展开状态但重新加载
    if (qualityLoaded) {
      await renderDataQualityDeep();
    }
  } catch (e) {
    console.error('refreshAll 异常:', e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 手动刷新'; }
  }
}

// ===== 切换质量深度展开/收起 =====
$('toggleQualityBtn')?.addEventListener('click', async function() {
  const section = $('dataQualityDeep');
  if (qualityLoaded) {
    // 收起
    collapseQuality();
  } else {
    // 展开
    section.classList.add('visible');
    section.innerHTML = '加载中...';
    this.textContent = '加载中...';
    this.disabled = true;
    await renderDataQualityDeep();
  }
});

// ===== 自动刷新 60s =====
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(async () => {
    const indicator = $('autoRefreshIndicator');
    indicator.textContent = '刷新中...';
    await refreshAll();
    indicator.textContent = '60s 自动刷新';
  }, 60000);
}

// ===== 手动刷新 =====
$('manualRefreshBtn')?.addEventListener('click', async () => {
  // 重置自动刷新周期
  startAutoRefresh();
  await refreshAll();
});

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', async () => {
  await refreshAll();
  startAutoRefresh();
});
</script>
</body>
</html>
