# ============================================
# nginx.conf - 量化交易系统 Nginx 配置
# ============================================
# 部署模式：Nginx 作为反向代理
#   - 静态前端（/usr/share/nginx/html）：React SPA
#   - 后端 API（backend:8000）：FastAPI
#   - 后端静态（/static、/admin）：FastAPI StaticFiles
# ============================================

# ---- 通用配置 ----
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ---- 基础 ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    charset utf-8;

    # ---- 日志格式 ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- 性能优化 ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    # 客户端最大请求体（数据同步可能 100MB+）
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ---- gzip 压缩 ----
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ---- 代理超时（数据下载/同步可能慢）----
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    proxy_buffering        on;
    proxy_buffer_size      16k;
    proxy_buffers          8 32k;
    proxy_busy_buffers_size 64k;

    # ---- 上游：后端 FastAPI ----
    upstream backend_api {
        # Docker 内部：host.docker.internal 解析到宿主机 IP
        # 构建时替换 __BACKEND_HOST__ 和 __BACKEND_PORT__
        server __BACKEND_HOST__:__BACKEND_PORT__ max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---- 主服务 ----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 根目录：前端静态文件
        root /usr/share/nginx/html;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- 健康检查 ----
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # ---- 后端健康检查（透传）----
        location = /health {
            proxy_pass http://backend_api;
            access_log off;
        }

        # ---- API 反代（FastAPI 路由）----
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE/流式响应支持
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
        }

        # ---- 后端静态资源（/static 路由）----
        location /static/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 静态资源缓存 30 天
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
        }

        # ---- 管理后台（/admin → 后端 monitor.html）----
        location /admin {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 不缓存（监控数据实时）
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ---- 前端静态资源（带 hash 的 JS/CSS/图片）----
        # React 构建产物文件名含 hash（如 main.abc123.js），可永久缓存
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            access_log off;
            try_files $uri =404;
        }

        # ---- 文档（PDF/CSV）----
        location ~* \.(?:pdf|csv|xlsx?|docx?)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800" always;
        }

        # ---- SPA fallback（所有非 API/静态路径）----
        # 必须放最后，确保 API 路由优先匹配
        location / {
            # 不缓存 HTML（确保新版本生效）
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires off;

            try_files $uri $uri/ /index.html;
        }

        # ---- 自定义错误页 ----
        error_page 404 /index.html;       # SPA 404 走前端路由
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
