# ============================================
# docker-compose.frontend.yml - 前端服务编排（Nginx）
# ============================================
# 用法:
#   docker compose -f docker-compose.frontend.yml --env-file .env.production up -d
#   docker compose -f docker-compose.frontend.yml --env-file .env.production down
#   docker compose -f docker-compose.frontend.yml logs -f
#
# 注意：后端需先启动（docker compose up -d）
#       本文件构建时注入后端地址（默认 host.docker.internal:8000）
# ============================================

name: quant-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # 后端地址（Docker Desktop macOS 用 host.docker.internal，Linux 可改为宿主机 IP）
        - BACKEND_HOST=host.docker.internal
        - BACKEND_PORT=8000
        # Vite API base（同域部署用 /api）
        - VITE_API_BASE=/api
    image: quant-frontend:1.0.0
    container_name: quant-frontend
    restart: unless-stopped
    # extra_hosts:  # Linux 下如 host.docker.internal 不生效，取消注释并替换 IP
    #   - "host.docker.internal:172.17.0.1"
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
